<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pendataan Saldo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f5f8fa;
            --bg-card: #ffffff;
            --text-main: #181c32;
            --text-muted: #a1a5b7;
            --border-color: #eff0f2;
            --accent-blue: #3e97ff;
            --accent-green: #50cd89;
            --accent-red: #f1416c;
            --accent-orange: #ffc700;
            --shadow-card: 0 0 30px 0 rgba(82,63,105,0.05);
            --font-family: 'Inter', sans-serif;
            
            /* Warna untuk Glow */
            --glow-green: rgba(80, 205, 137, 0.35);
            --glow-red: rgba(241, 65, 108, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 13px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header-title { font-size: 18px; font-weight: 600; }
        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(80, 205, 137, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--accent-green);
            font-weight: 600;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }

        .stat-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
        }
        .stat-card.deposit::before { background: var(--accent-blue); }
        .stat-card.withdraw::before { background: var(--accent-red); }
        .stat-card.kas::before { background: var(--accent-green); }
        .stat-card.total::before { background: var(--accent-orange); }

        .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 500; }
        .stat-value { font-size: 22px; font-weight: 700; }

        /* Tabs Navigation */
        .tabs-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tabs-nav {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #fdfdff;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-muted);
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: #f9fafb;
        }

        .tab-btn.active {
            color: var(--text-main);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
        }

        .tab-btn.deposit.active { color: var(--accent-blue); }
        .tab-btn.deposit.active::after { background: var(--accent-blue); }
        
        .tab-btn.withdraw.active { color: var(--accent-red); }
        .tab-btn.withdraw.active::after { background: var(--accent-red); }

        .tab-btn.kas.active { color: var(--accent-green); }
        .tab-btn.kas.active::after { background: var(--accent-green); }

        /* Table Style */
        .table-content { padding: 0; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }

        thead th {
            text-align: left;
            padding: 12px 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            background: #f9fafb;
        }

        /* Row Styles with Glow Effects */
        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        tbody tr:last-child { border-bottom: none; }

        /* Status AKTIF - Green Glow */
        tr.status-aktif {
            background-color: rgba(80, 205, 137, 0.05);
            box-shadow: inset 0 0 20px var(--glow-green);
            border-bottom: 1px solid rgba(80, 205, 137, 0.2);
        }
        tr.status-aktif td { color: #0a6842; }
        tr.status-aktif:hover { background-color: rgba(80, 205, 137, 0.1); }

        /* Status OFF - Red Glow */
        tr.status-off {
            background-color: rgba(241, 65, 108, 0.05);
            box-shadow: inset 0 0 20px var(--glow-red);
            border-bottom: 1px solid rgba(241, 65, 108, 0.2);
        }
        tr.status-off td { color: #d92d4f; }
        tr.status-off:hover { background-color: rgba(241, 65, 108, 0.1); }

        td {
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-main);
        }

        .td-muted { color: var(--text-muted); }
        .td-saldo { font-weight: 600; color: var(--accent-green); }
        /* Override saldo color if row is OFF */
        tr.status-off .td-saldo { color: #f1416c; }

        .badge-time {
            background: #f5f8fa;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        /* Custom Select Dropdown */
        .select-status {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #fff;
            font-family: var(--font-family);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .select-status:focus {
            border-color: var(--accent-blue);
        }

        .select-status.aktif {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: rgba(80, 205, 137, 0.1);
        }

        .select-status.off {
            border-color: var(--accent-red);
            color: var(--accent-red);
            background: rgba(241, 65, 108, 0.1);
        }

        /* Empty State */
        .empty-row td {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1 class="header-title">Dashboard Pendataan Saldo</h1>
        <div class="live-badge">
            <div class="live-dot"></div>
            <span id="live-time">LIVE</span>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card deposit">
            <div class="stat-label">Total Deposit</div>
            <div class="stat-value" id="total-deposit">Rp 0</div>
        </div>
        <div class="stat-card withdraw">
            <div class="stat-label">Total Withdraw</div>
            <div class="stat-value" id="total-withdraw">Rp 0</div>
        </div>
        <div class="stat-card kas">
            <div class="stat-label">Total Kas</div>
            <div class="stat-value" id="total-kas">Rp 0</div>
        </div>
        <div class="stat-card total">
            <div class="stat-label">Grand Total</div>
            <div class="stat-value" id="grand-total">Rp 0</div>
        </div>
    </div>

    <!-- Tabbed Table Section -->
    <div class="tabs-container">
        <div class="tabs-nav">
            <button class="tab-btn deposit active" onclick="switchTab('deposit')">Deposit</button>
            <button class="tab-btn withdraw" onclick="switchTab('withdraw')">Withdraw</button>
            <button class="tab-btn kas" onclick="switchTab('kas')">Kas</button>
        </div>
        <div class="table-content">
            <table>
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>NAMA BANK / SHEET</th>
                        <th>SALDO AKHIR</th>
                        <th>STATUS / UPDATE</th>
                        <th>SET STATUS</th> <!-- Kolom Baru -->
                    </tr>
                </thead>
                <tbody id="main-table-body">
                    <tr><td colspan="5" class="empty-row">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Configuration
    const SPREADSHEET_ID = '1rpBkr-fwYfz8DT76dOMwjh9v8oiM_qM1oa8mGGWbb-U';
    const SHEET_NAME = 'NAMA SHEET';
    const REFRESH_INTERVAL = 5000;
    const STORAGE_KEY = 'bank_status_settings'; // Key untuk Local Storage

    // State
    let currentTab = 'deposit';
    let lastUpdateTime = new Date();
    
    // Data Store
    let dataStore = {
        deposit: [],
        withdraw: [],
        kas: []
    };

    // DOM Elements
    const elTotalDeposit = document.getElementById('total-deposit');
    const elTotalWithdraw = document.getElementById('total-withdraw');
    const elTotalKas = document.getElementById('total-kas');
    const elGrandTotal = document.getElementById('grand-total');
    const elTableBody = document.getElementById('main-table-body');
    const elLiveTime = document.getElementById('live-time');
    const tabButtons = document.querySelectorAll('.tab-btn');

    // Helpers
    const formatRupiah = (num) => {
        const number = parseFloat(num) || 0;
        return 'Rp ' + number.toLocaleString('id-ID');
    };

    // --- LOCAL STORAGE FUNCTIONS ---
    // Ambil semua pengaturan dari storage
    function getSettings() {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : {};
    }

    // Simpan pengaturan satu item
    function saveSetting(bankName, status) {
        const settings = getSettings();
        settings[bankName] = status;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    // Ambil status spesifik bank
    function getBankStatus(bankName) {
        const settings = getSettings();
        // Default 'Aktif' jika belum ada setting
        return settings[bankName] || 'Aktif';
    }
    // --------------------------------

    // Update Clock Live
    setInterval(() => {
        elLiveTime.innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    // Tab Switching Logic
    function switchTab(tabName) {
        currentTab = tabName;
        
        // Update active states for buttons
        tabButtons.forEach(btn => {
            btn.classList.remove('active');
            if(btn.classList.contains(tabName)) {
                btn.classList.add('active');
            }
        });

        renderTable();
    }

    // Handler untuk perubahan dropdown
    function handleStatusChange(selectElement, bankName) {
        const status = selectElement.value;
        saveSetting(bankName, status);
        
        // Update styling dropdown
        selectElement.className = 'select-status ' + status.toLowerCase();
        
        // Update styling baris (TR)
        const row = selectElement.closest('tr');
        row.className = ''; // Reset class
        row.classList.add('status-' + status.toLowerCase());
    }

    // Render Table
    function renderTable() {
        let data = [...dataStore[currentTab]];
        
        // Sorting Descending
        data.sort((a, b) => {
            const valA = parseFloat(a.saldo) || 0;
            const valB = parseFloat(b.saldo) || 0;
            return valB - valA;
        });

        const timeString = lastUpdateTime.toLocaleString('id-ID');

        if (!data || data.length === 0) {
            elTableBody.innerHTML = `<tr><td colspan="5" class="empty-row">Tidak ada data untuk kategori ini.</td></tr>`;
            return;
        }

        let html = '';
        data.forEach((item, idx) => {
            // Cek status di Local Storage
            const currentStatus = getBankStatus(item.name);
            const statusClass = currentStatus.toLowerCase();

            html += `
                <tr class="status-${statusClass}">
                    <td>${idx + 1}</td>
                    <td style="font-weight:600">${item.name}</td>
                    <td class="td-saldo">${formatRupiah(item.saldo)}</td>
                    <td><span class="badge-time">${timeString}</span></td>
                    <td>
                        <select class="select-status ${statusClass}" onchange="handleStatusChange(this, '${item.name}')">
                            <option value="Aktif" ${currentStatus === 'Aktif' ? 'selected' : ''}>Aktif</option>
                            <option value="Off" ${currentStatus === 'Off' ? 'selected' : ''}>Off</option>
                        </select>
                    </td>
                </tr>
            `;
        });
        elTableBody.innerHTML = html;
    }

    // Fetch Data
    async function fetchData() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
            const response = await fetch(url);
            const text = await response.text();
            
            const jsonString = text.substring(47).slice(0, -2);
            const json = JSON.parse(jsonString);
            const rows = json.table.rows;

            let tempDeposit = [];
            let tempWithdraw = [];
            let tempKas = [];

            for (let i = 2; i < rows.length; i++) {
                const c = rows[i].c;
                const val = (idx) => (c && c[idx]) ? c[idx].v : null;

                // 1. Deposit
                const dName = val(0);
                const dSaldo = val(1);
                if (dName && dSaldo) tempDeposit.push({ name: dName, saldo: dSaldo });

                // 2. Withdraw
                const wName = val(2);
                const wSaldo = val(3);
                if (wName && wSaldo) tempWithdraw.push({ name: wName, saldo: wSaldo });

                // 3. Kas
                const kName = val(4);
                const kSaldo = val(5);
                if (kName && kSaldo) tempKas.push({ name: kName, saldo: kSaldo });
            }

            dataStore.deposit = tempDeposit;
            dataStore.withdraw = tempWithdraw;
            dataStore.kas = tempKas;
            lastUpdateTime = new Date();

            // Calculate Totals
            const sumDepo = tempDeposit.reduce((acc, cur) => acc + parseFloat(cur.saldo), 0);
            const sumWD = tempWithdraw.reduce((acc, cur) => acc + parseFloat(cur.saldo), 0);
            const sumKas = tempKas.reduce((acc, cur) => acc + parseFloat(cur.saldo), 0);
            
            elTotalDeposit.innerText = formatRupiah(sumDepo);
            elTotalWithdraw.innerText = formatRupiah(sumWD);
            elTotalKas.innerText = formatRupiah(sumKas);
            elGrandTotal.innerText = formatRupiah(sumDepo + sumWD + sumKas);

            renderTable();

        } catch (error) {
            console.error('Error:', error);
            elTableBody.innerHTML = `<tr><td colspan="5" class="empty-row" style="color:#f1416c">Gagal memuat data. Cek koneksi atau Publish Sheet.</td></tr>`;
        }
    }

    // Initialize
    fetchData();
    setInterval(fetchData, REFRESH_INTERVAL);

</script>
</body>
</html>
