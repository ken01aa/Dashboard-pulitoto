<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Bola Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            border: 2px solid #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .header h1 {
            color: #FFD700;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            margin-bottom: 15px;
            color: #FFD700;
            font-size: 1.2em;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 20px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #555;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            transition: border 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 180px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
        }

        .btn-copy {
            background: linear-gradient(135deg, #333, #555);
            color: #FFD700;
            border: 2px solid #FFD700;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .output-section {
            margin-top: 40px;
        }

        .preview-area {
            background: rgba(26, 26, 26, 0.95);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #444;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        #previewOutput {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.4;
        }

        .tables-container {
            margin-top: 40px;
        }

        .match-table-preview {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            background: #0a0a0a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
            border: 2px solid #FFD700;
        }

        .league-header-preview {
            background: linear-gradient(90deg, #1a1a1a, #FFD700, #1a1a1a);
            color: #000;
            padding: 18px;
            text-align: center;
            font-size: 1.6em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }

        .table-header-preview {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
            font-weight: bold;
            font-family: inherit;
        }

        .table-header-preview th {
            padding: 16px 12px;
            text-align: left;
            font-size: 1em;
            border-bottom: 2px solid #FFD700;
        }

        .match-table-preview td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            color: #fff;
        }

        .score-preview {
            font-weight: bold;
            color: #FFD700;
            font-size: 1.1em;
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(20, 20, 20, 0.9);
            border-radius: 10px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid #444;
        }

        .settings-title {
            color: #FFD700;
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            color: #FFD700;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 2px solid #555;
            cursor: pointer;
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            border: 2px solid #555;
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 3px;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid #555;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .range-value {
            color: #FFD700;
            font-weight: bold;
            margin-left: 10px;
        }

        .font-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 5px;
        }

        .font-option {
            padding: 8px 12px;
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid #555;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-family: inherit;
        }

        .font-option:hover {
            border-color: #FFD700;
        }

        .font-option.active {
            background: #FFD700;
            color: #000;
            border-color: #FFD700;
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 8px 15px;
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid #555;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: #FFD700;
            transform: translateY(-2px);
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #FFD700;
            color: #000;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* Responsive - TANPA SCROLL HORIZONTAL */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .panel {
                padding: 15px;
            }
            
            .btn {
                min-width: 100%;
                margin-bottom: 10px;
            }
            
            .settings-grid {
                grid-template-columns: 1fr;
            }
            
            .font-options {
                grid-template-columns: repeat(2, 1fr);
            }
            
            /* Preview tables di HP */
            .match-table-preview {
                display: block;
                width: 100%;
                overflow: visible !important;
            }
            
            .match-table-preview table {
                display: table;
                width: 100%;
                table-layout: fixed;
            }
            
            .match-table-preview th,
            .match-table-preview td {
                display: table-cell;
                padding: 10px 8px;
                font-size: 13px;
                word-break: break-word;
                overflow-wrap: break-word;
                hyphens: auto;
                width: auto;
                white-space: normal;
            }
            
            .match-table-preview th:nth-child(1),
            .match-table-preview td:nth-child(1) {
                width: 30%;
                min-width: 100px;
            }
            
            .match-table-preview th:nth-child(2),
            .match-table-preview td:nth-child(2) {
                width: 50%;
                min-width: 150px;
            }
            
            .match-table-preview th:nth-child(3),
            .match-table-preview td:nth-child(3) {
                width: 20%;
                min-width: 70px;
            }
            
            .preview-area {
                overflow-x: visible !important;
                padding: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .match-table-preview th,
            .match-table-preview td {
                padding: 8px 6px;
                font-size: 12px;
            }
            
            .league-header-preview {
                padding: 12px;
                font-size: 1.2em;
            }
            
            .match-table-preview th:nth-child(1),
            .match-table-preview td:nth-child(1) {
                width: 35%;
            }
            
            .match-table-preview th:nth-child(2),
            .match-table-preview td:nth-child(2) {
                width: 45%;
            }
            
            .match-table-preview th:nth-child(3),
            .match-table-preview td:nth-child(3) {
                width: 20%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ PREDIKSI BOLA PULITOTO ⚽</h1>
            <p>Generator Tabel Prediksi Pertandingan Sepak Bola</p>
        </div>

        <div class="panel">
            <div class="input-section">
                <label for="matchInput">📝 Input Data Pertandingan:</label>
                <textarea id="matchInput" placeholder="Contoh format:
LITHUANIA A LEAGUE
31/05 23:00 WIB Kauno Zalgiris VS DFK Dainava 2 : 1
01/06 20:00 WIB FK Riteriai VS FK Panevezys 1 : 2

ENGLISH PREMIER LEAGUE
01/06 22:00 WIB Manchester United VS Liverpool 3 : 2
02/06 01:00 WIB Chelsea VS Arsenal 1 : 1"></textarea>
                
                <div class="buttons">
                    <button class="btn btn-generate" onclick="generateTables()">
                        🚀 Generate Tabel
                    </button>
                    <button class="btn btn-copy" onclick="copyHTML()">
                        📋 Copy HTML
                    </button>
                </div>
            </div>

            <!-- SETTINGS SECTION -->
            <div class="settings-panel">
                <div class="settings-title">🎨 Pengaturan Tampilan</div>
                
                <div class="settings-grid">
                    <!-- Warna Tabel -->
                    <div class="setting-group">
                        <label>Warna Border Tabel:</label>
                        <div class="color-picker">
                            <div class="color-preview" id="borderColorPreview" style="background: #FFD700;"></div>
                            <input type="color" id="borderColor" value="#FFD700" onchange="updateBorderColor(this.value)">
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Warna Header Liga:</label>
                        <div class="color-picker">
                            <div class="color-preview" id="headerColorPreview" style="background: #FFD700;"></div>
                            <input type="color" id="headerColor" value="#FFD700" onchange="updateHeaderColor(this.value)">
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Warna Teks Header:</label>
                        <div class="color-picker">
                            <div class="color-preview" id="headerTextColorPreview" style="background: #000000;"></div>
                            <input type="color" id="headerTextColor" value="#000000" onchange="updateHeaderTextColor(this.value)">
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Warna Background Tabel:</label>
                        <div class="color-picker">
                            <div class="color-preview" id="tableBgColorPreview" style="background: #0a0a0a;"></div>
                            <input type="color" id="tableBgColor" value="#0a0a0a" onchange="updateTableBgColor(this.value)">
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Warna Teks Skor:</label>
                        <div class="color-picker">
                            <div class="color-preview" id="scoreColorPreview" style="background: #FFD700;"></div>
                            <input type="color" id="scoreColor" value="#FFD700" onchange="updateScoreColor(this.value)">
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Ukuran Font (px):</label>
                        <div style="display: flex; align-items: center;">
                            <input type="range" id="fontSize" min="10" max="20" value="12" step="1" oninput="updateFontSize(this.value)">
                            <span class="range-value" id="fontSizeValue">12px</span>
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Jenis Font:</label>
                        <div class="font-options">
                            <div class="font-option active" onclick="selectFont(this, 'Arial, sans-serif')" style="font-family: Arial, sans-serif;">Arial</div>
                            <div class="font-option" onclick="selectFont(this, 'Georgia, serif')" style="font-family: Georgia, serif;">Georgia</div>
                            <div class="font-option" onclick="selectFont(this, 'Courier New, monospace')" style="font-family: 'Courier New', monospace;">Courier</div>
                            <div class="font-option" onclick="selectFont(this, 'Verdana, sans-serif')" style="font-family: Verdana, sans-serif;">Verdana</div>
                            <div class="font-option" onclick="selectFont(this, 'Tahoma, sans-serif')" style="font-family: Tahoma, sans-serif;">Tahoma</div>
                            <div class="font-option" onclick="selectFont(this, 'Trebuchet MS, sans-serif')" style="font-family: 'Trebuchet MS', sans-serif;">Trebuchet</div>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <label style="color: #FFD700; margin-bottom: 10px; display: block;">Preset Warna (Sama dengan Dashboard Asli):</label>
                    <div class="preset-buttons">
                        <button class="preset-btn" onclick="applyPreset('blog_pulitoto')" style="background: #C19A5B; color: #fff; border-color: #C19A5B; font-weight: bold;">BLOG PULITOTO</button>
                        <button class="preset-btn" onclick="applyPreset('dashboard_asli')" style="background: #FFD700; color: #000; border-color: #FFD700;">DASHBOARD ASLI</button>
                        <button class="preset-btn" onclick="applyPreset('biru_dashboard')" style="background: #007BFF; color: #fff;">BIRU DASHBOARD</button>
                        <button class="preset-btn" onclick="applyPreset('hijau_dashboard')" style="background: #28A745; color: #fff;">HIJAU DASHBOARD</button>
                        <button class="preset-btn" onclick="applyPreset('merah_dashboard')" style="background: #DC3545; color: #fff;">MERAH DASHBOARD</button>
                        <button class="preset-btn" onclick="applyPreset('ungu_dashboard')" style="background: #6F42C1; color: #fff;">UNGU DASHBOARD</button>
                        <button class="preset-btn" onclick="applyPreset('cyan_dashboard')" style="background: #17A2B8; color: #fff;">CYAN DASHBOARD</button>
                        <button class="preset-btn" onclick="applyPreset('oranye_dashboard')" style="background: #FD7E14; color: #000;">ORANYE DASHBOARD</button>
                        <button class="preset-btn" onclick="applyPreset('pink_dashboard')" style="background: #E83E8C; color: #fff;">PINK DASHBOARD</button>
                    </div>
                </div>
            </div>

            <div class="output-section">
                <label style="color: #FFD700; font-size: 1.2em; margin-bottom: 15px; display: block;">
                    📊 Preview Tabel:
                </label>
                <div id="tablesContainer" class="tables-container">
                    <!-- Tabel akan ditampilkan di sini -->
                </div>
                
                <label style="color: #FFD700; font-size: 1.2em; margin: 30px 0 15px 0; display: block;">
                    📝 HTML untuk Blog:
                </label>
                <div class="preview-area">
                    <pre id="previewOutput">Generate tabel untuk melihat HTML...</pre>
                </div>
            </div>
        </div>

        <div class="footer">
            Dashboard Prediksi Bola © 2026 • Insight & Discipline by KEN
        </div>
    </div>

    <div class="notification" id="notification">✓ Berhasil disalin!</div>

    <script>
        // Settings state
        const settings = {
            borderColor: '#FFD700',
            headerColor: '#FFD700',
            headerTextColor: '#000000',
            tableBgColor: '#0a0a0a',
            scoreColor: '#FFD700',
            textColor: '#ffffff',
            fontSize: '12',
            fontFamily: 'Arial, sans-serif'
        };

        // Update color functions
        function updateBorderColor(color) {
            settings.borderColor = color;
            document.getElementById('borderColorPreview').style.background = color;
            generateTables();
        }

        function updateHeaderColor(color) {
            settings.headerColor = color;
            document.getElementById('headerColorPreview').style.background = color;
            generateTables();
        }

        function updateHeaderTextColor(color) {
            settings.headerTextColor = color;
            document.getElementById('headerTextColorPreview').style.background = color;
            generateTables();
        }

        function updateTableBgColor(color) {
            settings.tableBgColor = color;
            document.getElementById('tableBgColorPreview').style.background = color;
            generateTables();
        }

        function updateScoreColor(color) {
            settings.scoreColor = color;
            document.getElementById('scoreColorPreview').style.background = color;
            generateTables();
        }

        function updateFontSize(size) {
            settings.fontSize = size;
            document.getElementById('fontSizeValue').textContent = size + 'px';
            generateTables();
        }

        function selectFont(element, font) {
            settings.fontFamily = font;
            document.querySelectorAll('.font-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            generateTables();
        }

        // Color presets
        function applyPreset(presetName) {
            const presets = {
                'blog_pulitoto': {
                    borderColor: '#C19A5B',
                    headerMainColor: '#C19A5B',
                    headerTextColor: '#000000',
                    tableBgColor: '#ffffff',
                    scoreColor: '#a67c3d',
                    textColor: '#333333',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'dashboard_asli': {
                    borderColor: '#FFD700',
                    headerMainColor: '#FFD700',
                    headerTextColor: '#000000',
                    tableBgColor: '#0a0a0a',
                    scoreColor: '#FFD700',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'biru_dashboard': {
                    borderColor: '#007BFF',
                    headerMainColor: '#007BFF',
                    headerTextColor: '#FFFFFF',
                    tableBgColor: '#001a33',
                    scoreColor: '#66B2FF',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'hijau_dashboard': {
                    borderColor: '#28A745',
                    headerMainColor: '#28A745',
                    headerTextColor: '#FFFFFF',
                    tableBgColor: '#0a200a',
                    scoreColor: '#90EE90',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'merah_dashboard': {
                    borderColor: '#DC3545',
                    headerMainColor: '#DC3545',
                    headerTextColor: '#FFFFFF',
                    tableBgColor: '#330a0a',
                    scoreColor: '#FF6B6B',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'ungu_dashboard': {
                    borderColor: '#6F42C1',
                    headerMainColor: '#6F42C1',
                    headerTextColor: '#FFFFFF',
                    tableBgColor: '#1a0a33',
                    scoreColor: '#B19CD9',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'cyan_dashboard': {
                    borderColor: '#17A2B8',
                    headerMainColor: '#17A2B8',
                    headerTextColor: '#FFFFFF',
                    tableBgColor: '#0a1a1a',
                    scoreColor: '#5bc0de',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'oranye_dashboard': {
                    borderColor: '#FD7E14',
                    headerMainColor: '#FD7E14',
                    headerTextColor: '#000000',
                    tableBgColor: '#331a0a',
                    scoreColor: '#FFA500',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                },
                'pink_dashboard': {
                    borderColor: '#E83E8C',
                    headerMainColor: '#E83E8C',
                    headerTextColor: '#FFFFFF',
                    tableBgColor: '#330a1a',
                    scoreColor: '#FFB6C1',
                    textColor: '#ffffff',
                    fontSize: '12',
                    fontFamily: 'Arial, sans-serif'
                }
            };

            const preset = presets[presetName];
            if (preset) {
                // Update settings
                settings.borderColor = preset.borderColor;
                settings.headerColor = preset.headerMainColor;
                settings.headerTextColor = preset.headerTextColor;
                settings.tableBgColor = preset.tableBgColor;
                settings.scoreColor = preset.scoreColor;
                settings.textColor = preset.textColor;
                settings.fontSize = preset.fontSize;
                settings.fontFamily = preset.fontFamily;

                // Update color pickers
                document.getElementById('borderColor').value = preset.borderColor;
                document.getElementById('headerColor').value = preset.headerMainColor;
                document.getElementById('headerTextColor').value = preset.headerTextColor;
                document.getElementById('tableBgColor').value = preset.tableBgColor;
                document.getElementById('scoreColor').value = preset.scoreColor;
                document.getElementById('fontSize').value = preset.fontSize;
                document.getElementById('fontSizeValue').textContent = preset.fontSize + 'px';

                // Update preview colors
                document.getElementById('borderColorPreview').style.background = preset.borderColor;
                document.getElementById('headerColorPreview').style.background = preset.headerMainColor;
                document.getElementById('headerTextColorPreview').style.background = preset.headerTextColor;
                document.getElementById('tableBgColorPreview').style.background = preset.tableBgColor;
                document.getElementById('scoreColorPreview').style.background = preset.scoreColor;

                // Update font selection
                document.querySelectorAll('.font-option').forEach(opt => opt.classList.remove('active'));
                const fontElements = document.querySelectorAll('.font-option');
                fontElements.forEach(opt => {
                    const fontStyle = opt.style.fontFamily;
                    const presetFont = preset.fontFamily.split(',')[0].trim();
                    if (fontStyle.includes(presetFont)) {
                        opt.classList.add('active');
                    }
                });

                generateTables();
                showNotification(`✅ Preset "${presetName.replace('_', ' ').toUpperCase()}" diterapkan!`, true);
            }
        }

        // Update tanggal untuk marquee
        function getDates() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const todayStr = today.toLocaleDateString('id-ID', options);
            const tomorrowStr = tomorrow.toLocaleDateString('id-ID', options);
            
            return { todayStr, tomorrowStr };
        }

        // Parse input text
        function parseInput(inputText) {
            inputText = inputText.replace(/[–—−]/g, '-'); // samakan dash unicode jadi "-"
            const lines = inputText.split('\n');
            const leagues = [];
            let currentLeague = null;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                if (!/\bvs\b/i.test(trimmed) || !/\d+\s*[:\-–—−]\s*\d+/.test(trimmed)) {
                    if (currentLeague && currentLeague.matches.length > 0) {
                        leagues.push(currentLeague);
                    }
                    currentLeague = {
                        name: trimmed,
                        matches: []
                    };
                } else if (currentLeague) {
                    const matchRegex = /(\d{2}\/\d{2})\s+(\d{2}:\d{2})\s+(\w+)\s+(.+?)\s+\bvs\b\s+(.+?)\s+(\d+)\s*[:\-–—−]\s*(\d+)/i;
                    const match = trimmed.match(matchRegex);
                    
                    if (match) {
                        currentLeague.matches.push({
                            date: match[1],
                            time: match[2],
                            timezone: match[3],
                            team1: match[4].trim(),
                            team2: match[5].trim(),
                            score1: parseInt(match[6]),
                            score2: parseInt(match[7])
                        });
                    }
                }
            });

            if (currentLeague && currentLeague.matches.length > 0) {
                leagues.push(currentLeague);
            }

            return leagues;
        }

        // Fungsi untuk menghitung brightness warna
        function getBrightness(hexColor) {
            hexColor = hexColor.replace('#', '');
            
            if (hexColor.length === 3) {
                hexColor = hexColor.split('').map(char => char + char).join('');
            }
            
            const r = parseInt(hexColor.substr(0, 2), 16);
            const g = parseInt(hexColor.substr(2, 2), 16);
            const b = parseInt(hexColor.substr(4, 2), 16);
            
            return (r * 299 + g * 587 + b * 114) / 1000;
        }

        // Copy HTML untuk blog
        function copyHTML() {
            if (!window.htmlForBlog) {
                showNotification('Generate tabel dulu!', false);
                return;
            }

            const textToCopy = window.htmlForBlog;

            navigator.clipboard.writeText(textToCopy)
                .then(() => showNotification('✓ HTML berhasil disalin!', true))
                .catch(err => {
                    const textArea = document.createElement('textarea');
                    textArea.value = textToCopy;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showNotification('✓ HTML berhasil disalin!', true);
                    } catch (e) {
                        showNotification('✗ Gagal menyalin', false);
                    }
                    document.body.removeChild(textArea);
                });
        }

            notif.style.background = success ? '#FFD700' : '#ff4444';
