<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Bola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .toast { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #16a34a; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center p-6">
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-3 bg-green-600 text-white text-sm font-medium rounded-xl shadow-lg hidden items-center gap-2 toast z-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span>Prediksi berhasil disalin!</span>
    </div>

    <!-- Hidden Storage -->
    <textarea id="dataPrediksi" class="hidden"></textarea>

    <!-- White Box Wrapper -->
    <div class="w-full max-w-5xl bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden flex flex-col" style="height: 90vh;">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-stone-200 flex items-center justify-between flex-shrink-0">
            <div>
                <h2 class="text-lg font-semibold text-stone-900">Prediksi Bola</h2>
                <p class="text-sm text-stone-500">Konten dari shortq.info</p>
            </div>
            <div class="flex items-center gap-2">
                
                <!-- Tombol Copy -->
                <button onclick="copyPrediksi()" id="btnCopy" class="px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 transition-colors duration-150 flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" /></svg>
                    <span id="textBtnCopy">Copy Prediksi Terbaru</span>
                </button>

                <!-- Tombol Refresh -->
                <button onclick="ambilDataSekarang()" class="px-3 py-2 bg-stone-100 text-stone-600 text-sm font-medium rounded-lg hover:bg-stone-200 transition-colors duration-150 flex items-center gap-2">
                    <svg id="iconRefresh" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>
                    <div id="spinRefresh" class="spinner hidden"></div>
                    <span>Refresh</span>
                </button>

                <!-- Tombol Buka Situs -->
                <a href="https://shortq.info/prediksibola" target="_blank" class="px-3 py-2 bg-stone-900 text-white text-sm font-medium rounded-lg hover:bg-stone-800 transition-colors duration-150 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" /></svg>
                    Buka Situs
                </a>
            </div>
        </div>
        
        <!-- Iframe -->
        <div class="flex-1 relative">
            <iframe 
                id="contentFrame"
                src="https://shortq.info/prediksibola" 
                class="absolute inset-0 w-full h-full border-0"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
        
    </div>
    
    <script>
        // Fungsi ambil data otomatis via Proxy (Cloudflare Friendly)
        async function ambilDataSekarang() {
            const icon = document.getElementById('iconRefresh');
            const spin = document.getElementById('spinRefresh');
            const btnText = document.getElementById('textBtnCopy');
            const dataArea = document.getElementById('dataPrediksi');
            
            // Tampilkan loading
            icon.classList.add('hidden');
            spin.classList.remove('hidden');
            btnText.textContent = "Mengambil data...";
            
            try {
                // Gunakan AllOrigins Proxy
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://shortq.info/prediksibola'));
                const data = await response.json();
                
                if(data.contents) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(data.contents, 'text/html');
                    const prediksiDiv = doc.querySelector('#accordion_2209_content_1 .card-body');
                    
                    if(prediksiDiv) {
                        let teks = prediksiDiv.innerText;
                        dataArea.value = teks;
                        alert('Data berhasil diperbarui! Kamu sudah bisa Copy.');
                    } else {
                        alert('Format data berubah, cek manual di Buka Situs.');
                    }
                } else {
                    alert('Gagal ambil data.');
                }
            } catch (error) {
                alert('Error koneksi.');
            }
            
            // Kembalikan tombol normal
            icon.classList.remove('hidden');
            spin.classList.add('hidden');
            btnText.textContent = "Copy Prediksi Terbaru";
        }

        function copyPrediksi() {
            var data = document.getElementById('dataPrediksi').value;
            
            if (!data.trim()) {
                alert("Data masih kosong. Klik tombol 'Refresh' dulu untuk mengambil prediksi terbaru.");
                return;
            }

            var tempInput = document.createElement("textarea");
            tempInput.value = data;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                alert('Gagal menyalin. Gunakan Ctrl+C manual.');
            }
            document.body.removeChild(tempInput);
        }

        function showToast() {
            var toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            setTimeout(function() {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 2500);
        }
    </script>

</body>
</html>
