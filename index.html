    <script>
        // Fungsi untuk memuat halaman
        function loadPage(page, element) {
            const contentDashboard = document.getElementById('content-dashboard');
            const contentFrame = document.getElementById('content-frame');
            const allMenus = document.querySelectorAll('.menu-item');
            const pageTitle = document.getElementById('page-title');

            // 1. Reset warna semua menu jadi tidak aktif
            allMenus.forEach(menu => {
                menu.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/30');
                menu.classList.add('text-slate-300', 'hover:bg-slate-800');
            });

            // 2. Aktifkan warna menu yang diklik
            element.classList.remove('text-slate-300', 'hover:bg-slate-800');
            element.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/30');

            // 3. Ambil Judul dari atribut data-title
            const title = element.getAttribute('data-title');
            
            // 4. Logika tampil konten
            if (page === 'dashboard') {
                contentDashboard.classList.remove('hidden');
                contentFrame.classList.add('hidden');
                contentFrame.src = "";
                pageTitle.innerText = title || "Dashboard Overview";
            } else {
                contentDashboard.classList.add('hidden');
                contentFrame.classList.remove('hidden');
                contentFrame.src = page;
                pageTitle.innerText = title || "Halaman";
            }
        }
    </script>
